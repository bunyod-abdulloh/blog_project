{% extends "blog/base.html" %}

{% block title %}Add New Post - My Blog{% endblock %}

{% block content %}
<h1>➕ Add New Post</h1>

{% if user.is_authenticated %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Publish</button>
    </form>
{% else %}
    <p>You must <a href="{% url 'login' %}">login</a> to add a post.</p>
{% endif %}

{% endblock %}
